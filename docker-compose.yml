name: port-au-next
services:
  # Shared PostgreSQL database
  postgres:
    image: postgres:17.9-alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - port_au_next_network

  # Minio Object Storage
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    volumes:
      - minio_data:/data
      - ./minio/policies:/policies
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: http://${MINIO_HOST}
    command: server /data --console-address ":9001" --address ":80"
    ports:
      - "9000:80" # S3 API listens on :80 inside container (--address ":80")
      - "9001:9001"  # Expose console port locally
    networks:
      - port_au_next_network

  # Nginx reverse proxy
  nginx:
    image: nginx:1.29-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - deployment-manager
    networks:
      - port_au_next_network
  
  redis:
    image: redis:7.4-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - port_au_next_network

  # Shared HTTP job scheduler (port-schedule)
  port-schedule:
    build:
      context: ./port-schedule
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=8080
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # Required: set PORT_SCHEDULE_MASTER_API_KEY in .env (see .env.example). Compose fails fast if unset/empty.
      - MASTER_API_KEY=${PORT_SCHEDULE_MASTER_API_KEY:?Set PORT_SCHEDULE_MASTER_API_KEY in .env (see .env.example)}
      # Set to "true" once to apply SQL migrations in migrations/001_init.sql (idempotent); then set back to false if you prefer.
      - MIGRATE_ON_START=${PORT_SCHEDULE_MIGRATE_ON_START:-false}
    ports:
      - "${PORT_SCHEDULE_HOST_PORT:-8085}:8080"
    depends_on:
      - postgres
    networks:
      - port_au_next_network

  # Image optimization service
  imgproxy:
    image: darthsim/imgproxy@sha256:2431fbc04ba06d2d598af7a4565286dd7e1a48a5eeb6365878119d75d7db75c0
    restart: always
    environment:
      IMGPROXY_BIND: ":80"
      IMGPROXY_TIMEOUT: "20"
      IMGPROXY_READ_REQUEST_TIMEOUT: "10"
      IMGPROXY_DOWNLOAD_TIMEOUT: "20"
      IMGPROXY_CONCURRENCY: "100"
      IMGPROXY_MAX_CLIENTS: "100"
      IMGPROXY_TTL: "2592000"
      IMGPROXY_USE_REDIS: "1"
      IMGPROXY_REDIS_URL: "redis://redis:6379/0"
      IMGPROXY_QUALITY: "80"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_MAX_SRC_FILE_SIZE: "20971520"
      IMGPROXY_DOWNLOAD_BUFFER_SIZE: "10485760"
      IMGPROXY_KEEP_ALIVE_TIMEOUT: "30"
    networks:
      - port_au_next_network

  # Deployment manager
  deployment-manager:
    build:
      context: ./deployment-manager
      dockerfile: Dockerfile
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps:/app/apps:rw
      - ./deployment-manager/public:/app/public:ro
      - ~/.ssh/id_rsa:/home/node/.ssh/id_rsa:ro
      - ~/.ssh/id_rsa.pub:/home/node/.ssh/id_rsa.pub:ro
      - ./nginx:/app/nginx:rw
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./minio/policies:/app/minio/policies
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - HOST_APPS_DIR=/app/apps
      - CLOUDFLARE_API_EMAIL=${CLOUDFLARE_API_EMAIL}
      - CLOUDFLARE_API_KEY=${CLOUDFLARE_API_KEY}
      - DEPLOYMENT_MANAGER_AUTH_EMAIL=${DEPLOYMENT_MANAGER_AUTH_EMAIL}
      - DEPLOYMENT_MANAGER_AUTH_PASSWORD=${DEPLOYMENT_MANAGER_AUTH_PASSWORD}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - NEXT_PUBLIC_DEPLOYMENT_MANAGER_HOST=${DEPLOYMENT_MANAGER_HOST}
      - MINIO_HOST=${MINIO_HOST}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - IMGPROXY_HOST=${IMGPROXY_HOST}
      # Same secret as port-schedule service; used to call PUT /admin/apps/:id/credentials on each production deploy.
      - PORT_SCHEDULE_MASTER_API_KEY=${PORT_SCHEDULE_MASTER_API_KEY:-}
      # Public hostname for optional nginx → port-schedule (leave unset to skip vhost only).
      - PORT_SCHEDULE_HOST=${PORT_SCHEDULE_HOST:-}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - port-schedule
    networks:
      - port_au_next_network

networks:
  port_au_next_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_cache:
  minio_data: